services:
  app1:
    image: nherrera3276/docker-course:1.0.1

    ports:
      - "8080:8080"

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: course_db
      DB_USER: root
      DB_PASSWORD: root

    depends_on:
      - postgres

  app2:
    image: nherrera3276/docker-course:1.0.1

    ports:
      - "8081:8080"

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: course_db
      DB_USER: root
      DB_PASSWORD: root

    depends_on:
      - postgres

  postgres:
    image: postgres:17
    container_name: postgres_nico

    environment:
      POSTGRES_DB: course_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root

    ports:
      - "5432:5432"

    volumes:
      - postgres-data-volume:/var/lib/postgresql/data

volumes:
  postgres-data-volume: